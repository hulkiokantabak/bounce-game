<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' https://gc.zgo.at; style-src 'self'; img-src 'self' data: blob:; connect-src 'self' https://api.anthropic.com https://api.openai.com https://generativelanguage.googleapis.com https://*.supabase.co https://hulkiokantabak.goatcounter.com https://api.groq.com https://api.mistral.ai https://api.deepseek.com https://api.x.ai; media-src 'self'; font-src 'self'; form-action 'none'; frame-src 'none'; worker-src 'none'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="description" content="BOUNCE — a one-thumb arcade game. Thread rings, place surfaces, chase your streak.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta property="og:title" content="BOUNCE">
  <meta property="og:description" content="A one-thumb arcade game. Thread rings, place surfaces, chase your streak.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://hulkiokantabak.github.io/bounce-game/">
  <title>BOUNCE</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔵</text></svg>">
</head>
<body>
  <canvas id="game"></canvas>

  <!-- Settings Panel -->
  <div id="settings-overlay" class="overlay hidden">
    <div class="settings-panel">
      <div class="settings-header">
        <span class="settings-title">Settings</span>
        <button class="settings-close">&times;</button>
      </div>

      <div class="settings-section">
        <div class="settings-row">
          <span class="settings-label">Player Name</span>
          <input type="text" class="settings-name-input" id="settings-player-name" maxlength="20" placeholder="Anonymous" autocomplete="off">
        </div>
        <p class="settings-desc">Your name on the leaderboard.</p>
      </div>

      <div class="settings-divider"></div>

      <div class="settings-section">
        <div class="settings-row">
          <span class="settings-label">Sound</span>
          <button class="settings-toggle" data-setting="sound">ON</button>
        </div>
        <div class="settings-row">
          <span class="settings-label">Haptics</span>
          <button class="settings-toggle" data-setting="haptics">ON</button>
        </div>
      </div>

      <div class="settings-divider"></div>

      <div class="settings-section">
        <div class="settings-section-title">AI Player</div>
        <p class="settings-desc">Connect an LLM to play BOUNCE. It sees the game state and places surfaces to thread rings.</p>
        <div class="settings-row">
          <span class="settings-label">Provider</span>
          <select class="settings-select" id="ai-provider-select"></select>
        </div>
        <div class="settings-row" id="ai-model-row">
          <span class="settings-label">Model</span>
          <select class="settings-select" id="ai-model-select"></select>
        </div>
        <div class="settings-row" id="ai-custom-model-row" hidden>
          <span class="settings-label">Model name</span>
          <input type="text" class="settings-name-input settings-api-key-input" id="ai-custom-model" placeholder="llama3.2" autocomplete="off">
        </div>
        <div class="settings-row" id="ai-custom-url-row" hidden>
          <span class="settings-label">Base URL</span>
          <input type="text" class="settings-name-input settings-custom-url-input" id="ai-custom-url" placeholder="http://localhost:11434/v1/..." autocomplete="off">
        </div>
        <div class="settings-row">
          <span class="settings-label">API Key</span>
          <input type="password" class="settings-name-input settings-api-key-input" id="ai-api-key" placeholder="paste key..." autocomplete="off">
        </div>
        <div class="settings-row">
          <span class="settings-label">Let AI play</span>
          <button class="settings-toggle" id="ai-play-toggle">OFF</button>
        </div>
        <p class="settings-desc" id="ai-status"></p>
      </div>

      <div class="settings-divider"></div>

      <div class="settings-section">
        <div class="settings-section-title">Simple Bot</div>
        <div class="settings-row">
          <span class="settings-label">Auto-play bot</span>
          <button class="settings-toggle" data-setting="aiDemo">OFF</button>
        </div>
        <p class="settings-desc">A rule-based bot — no AI. Tap X to stop.</p>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
  <script data-goatcounter="https://hulkiokantabak.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</body>
</html>
